services:
  frontend:
    build:
      context: ./app/frontend
      dockerfile: ../../docker/frontend.Dockerfile
    container_name: routea_frontend
    volumes:
      - ./app/frontend:/app
      - /app/node_modules
    ports:
      - "3003:3003"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3004
      NODE_ENV: development
      PORT: 3003
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    depends_on:
      - backend

  backend:
    build:
      context: ./app/backend
      dockerfile: ../../docker/backend.Dockerfile
    container_name: routea_backend
    volumes:
      - ./app/backend:/app
      - /app/node_modules
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/routea_db
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: routea_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: routea_db
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: